// Shared Components
function VChip({ children, variant, style }) {
  const cls = variant ? `v-chip v-chip--${variant}` : 'v-chip';
  return <span className={cls} style={style}>{children}</span>;
}

function VDot({ color = V.signal, size = 6, pulse }) {
  return <span style={{
    display: 'inline-block', width: size, height: size, borderRadius: 999, background: color, flexShrink: 0,
    boxShadow: `0 0 ${size * 2}px ${color}`, animation: pulse ? 'vpulse 1.6s ease-in-out infinite' : undefined,
  }} />;
}

function vHash(seed, n = 12) {
  let h = 0; for (let i = 0; i < seed.length; i++) h = ((h << 5) - h + seed.charCodeAt(i)) | 0;
  let out = ''; let x = Math.abs(h); const c = '0123456789abcdef';
  for (let i = 0; i < n; i++) { x = (x * 9301 + 49297) % 233280; out += c[x % 16]; }
  return out;
}

function VSeverity({ level }) {
  const map = {
    CRITICAL: { c: V.threat, bg: V.threatFaint, b: V.threatDim },
    HIGH:     { c: 'oklch(0.75 0.17 50)', bg: 'oklch(0.75 0.17 50 / 0.1)', b: 'oklch(0.75 0.17 50 / 0.25)' },
    MEDIUM:   { c: V.signal, bg: V.signalFaint, b: V.signalDim },
    LOW:      { c: V.inkDim, bg: 'rgba(255,255,255,0.03)', b: V.lineHi },
  };
  const m = map[level] || map.LOW;
  return (
    <span className="v-mono v-uc" style={{
      fontSize: 9, color: m.c, background: m.bg, border: `1px solid ${m.b}`,
      padding: '2px 7px', letterSpacing: 1.3, borderRadius: 2, display: 'inline-flex', alignItems: 'center', gap: 5,
    }}>
      <span style={{ width: 5, height: 5, borderRadius: 5, background: m.c, boxShadow: `0 0 6px ${m.c}` }}/>
      {level}
    </span>
  );
}

function VBrackets({ size = 10, color = V.ink, inset = 0 }) {

  </>);
}

function Docs({ setPage }) {
  const [activeDoc, setActiveDoc] = React.useState('quick-start');
  const doc = DOC_SECTIONS[activeDoc];

  const navSections = [
    { title: 'Getting started', items: [['quick-start', 'Quick Start']] },
    { title: 'Integrations', items: [['claude-code', 'Claude Code (MCP)']] },
    { title: 'API reference', items: [['post-findings', 'POST /findings'], ['post-search', 'POST /search']] },
  ];

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '220px 1fr', flex: 1, overflow: 'hidden' }}>
      {/* Left sidebar */}
      <div style={{ borderRight: `1px solid ${V.line}`, overflow: 'auto', padding: '20px 16px' }} className="v-scroll">
        {navSections.map(section => (
          <div key={section.title} style={{ marginBottom: 22 }}>
            <div className="v-mono v-uc" style={{ fontSize: 9, color: V.inkFaint, letterSpacing: 1.8, marginBottom: 8, padding: '0 8px' }}>{section.title}</div>
            {section.items.map(([key, label]) => (
              <div
                key={key}
                onClick={() => setActiveDoc(key)}
                style={{
                  padding: '5px 10px', margin: '0 -2px', fontSize: 11,
                  color: activeDoc === key ? V.signal : V.ink, cursor: 'pointer', borderRadius: 2,
                  background: activeDoc === key ? V.signalFaint : 'transparent',
                  borderLeft: activeDoc === key ? `2px solid ${V.signal}` : `2px solid transparent`,
                }}
                className="v-mono"
              >
                {label}
              </div>
            ))}
          </div>
        ))}
        <div style={{ marginTop: 32, padding: '16px 10px', border: `1px solid ${V.line}`, borderRadius: 3 }}>
          <div className="v-mono" style={{ fontSize: 10, color: V.inkDim, marginBottom: 8 }}>More docs coming</div>
          <div className="v-sans" style={{ fontSize: 11, color: V.inkFaint, lineHeight: 1.5 }}>
            Cursor, Aider, Copilot integrations, CLI reference, self-hosting guide.
          </div>
        </div>
      </div>

      {/* Main content */}
      <div style={{ overflow: 'auto', padding: '36px 56px' }} className="v-scroll">
        <div className="v-mono v-uc" style={{ fontSize: 10, color: V.inkFaint, letterSpacing: 1.6, marginBottom: 18 }}>
          {doc.breadcrumb} <span style={{ color: V.inkDim, margin: '0 6px' }}>›</span>
          <span style={{ color: V.ink }}>{doc.title}</span>
        </div>
        <h1 className="v-display" style={{ fontSize: 40, fontWeight: 500, color: V.ink, letterSpacing: -1.2, margin: 0, lineHeight: 1.05 }}>
          {doc.title}
        </h1>
        {doc.content()}
        <hr className="v-hairline" style={{ margin: '40px 0 0' }}/>
      </div>
    </div>
  );
}

function ParamTable({ rows }) {
  return (
    <div style={{ border: `1px solid ${V.line}`, borderRadius: 3, overflow: 'hidden' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '140px 80px 70px 1fr', padding: '10px 16px', borderBottom: `1px solid ${V.line}`, background: V.panel }} className="v-mono v-uc">
        {['param', 'type', '', 'description'].map((c, i) => <span key={i} style={{ fontSize: 9, color: V.inkFaint, letterSpacing: 1.5 }}>{c}</span>)}
      </div>
      {rows.map(([n, t, req, d], i) => (
        <div key={i} style={{ display: 'grid', gridTemplateColumns: '140px 80px 70px 1fr', padding: '12px 16px', borderBottom: i < rows.length - 1 ? `1px solid ${V.line}` : 'none', gap: 10, alignItems: 'baseline' }} className="v-mono">
          <span style={{ fontSize: 11, color: V.ink }}>{n}</span>
          <span style={{ fontSize: 11, color: V.neural }}>{t}</span>
          <span style={{ fontSize: 9, color: req === 'required' ? V.threat : V.inkDim }} className="v-uc">{req}</span>
          <span className="v-sans" style={{ fontSize: 12, color: V.inkDim, lineHeight: 1.55 }}>{d}</span>
        </div>
      ))}
    </div>
  );
}

function CodeBlock({ lang, title, children }) {
  return (
    <div style={{ border: `1px solid ${V.line}`, background: V.panel, borderRadius: 3, overflow: 'hidden' }}>
      <div style={{ display: 'flex', alignItems: 'center', padding: '8px 14px', borderBottom: `1px solid ${V.line}`, gap: 10 }}>
        <span className="v-mono v-uc" style={{ fontSize: 9, color: V.inkDim, letterSpacing: 1.3 }}>{lang}</span>
        {title && <span style={{ color: V.inkFaint, fontSize: 10 }}>/</span>}
        {title && <span className="v-mono" style={{ fontSize: 10, color: V.ink }}>{title}</span>}
      </div>
      <pre className="v-mono" style={{ margin: 0, padding: 14, fontSize: 11, lineHeight: 1.6, color: V.ink, overflow: 'auto' }}>{children}</pre>
    </div>
  );
}

// ============================================================================
// APP
// ============================================================================
function App() {
  const [page, setPage] = React.useState(() => {
    const hash = window.location.hash.slice(1) || 'dashboard';
    return hash;
  });

  React.useEffect(() => {
    const onHash = () => setPage(window.location.hash.slice(1) || 'dashboard');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  return (
    <div className="v-frame" style={{ width: '100%', minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Nav page={page} setPage={setPage} />
      {page === 'dashboard' && <Dashboard setPage={setPage} />}
      {page === 'how-it-works' && <HowItWorks setPage={setPage} />}
      {page === 'docs' && <Docs setPage={setPage} />}
      {page === 'demo' && <Demo setPage={setPage} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
