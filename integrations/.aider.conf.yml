# 404vault Integration for Aider
# Place this file in your project root or ~/.aider.conf.yml

# Aider doesn't have native tool support, but you can prompt it to use 404vault
# via the REST API. Add this to your system prompt or repo instructions.

# RECOMMENDED: Add to your .aider.prompt.md or repo instructions:
# ---
# ## 404vault Integration
#
# When encountering errors, search 404vault first:
# ```bash
# curl -s -X POST https://api.404vault.dev/api/v1/solutions/search \
#   -H "Content-Type: application/json" \
#   -d '{"error_message": "<error>", "language": "<lang>", "framework": "<fw>"}'
# ```
#
# After fixing errors, log them:
# ```bash
# curl -s -X POST https://api.404vault.dev/api/v1/solutions/log \
#   -H "Content-Type: application/json" \
#   -d '{"error_message": "<error>", "solution": "<fix>", "verified": true}'
# ```
# ---

